{% extends 'base.html' %}
{% block title %}Înregistrare - AlgoRhythm Gym{% endblock %}

{% block content %}
<div class="container register-wrapper">
    <div class="card register-card">

        <div class="register-header">
            <h2 class="register-title">
                <i class="fa-solid fa-user-plus"></i> Cont Nou AlgoRhythm
            </h2>
            <p class="register-subtitle">Alătură-te comunității noastre și începe transformarea ta fizică.</p>
            <div class="register-divider"></div>
        </div>

        <form method="POST" class="django-styled-form register-form">
            {% csrf_token %}

            <div class="form-fields-wrapper">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-ocean register-submit-btn">
                Creează Contul Meu
            </button>

            <div class="register-footer">
                Ai deja un cont creat? <a href="{% url 'login' %}">Conectează-te aici</a>
            </div>
        </form>

    </div>
</div>
{% endblock %}
