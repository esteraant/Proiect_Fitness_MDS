{% extends 'base.html' %}

{% block content %}
<div class="container gen-classes-container">
    <div class="welcome-card gen-classes-card">
        <h2 class="gen-classes-title">Generator Programe Recurente</h2>
        
        {% if messages %}
            <div class="gen-classes-messages">
            {% for message in messages %}
                <div class="gen-classes-alert {% if message.tags == 'success' %}alert-success{% else %}alert-error{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="gen-form-row row-2-cols">
                <div class="form-group">
                    <label class="gen-label">Nume Clasă:</label>
                    <input type="text" name="name" required class="gen-input">
                </div>
                <div class="form-group">
                    <label class="gen-label">Tip Clasă:</label>
                    <select name="type" class="gen-select">
                        <option value="GRP">Grup</option>
                        <option value="1TO1">Personal Training (1 la 1)</option>
                        <option value="IND">Individual (Fără antrenor)</option>
                    </select>
                </div>
            </div>

            <div class="gen-form-row row-2-cols">
                <div class="form-group">
                    <label class="gen-label">Antrenor:</label>
                    <select name="instructor" class="gen-select">
                        <option value="">Fără Antrenor</option>
                        {% for inst in instructors %}
                            <option value="{{ inst.id }}">{{ inst.first_name }} {{ inst.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label class="gen-label">Preț (RON):</label>
                    <input type="number" step="0.01" name="price" value="30.00" class="gen-input">
                </div>
            </div>

            <div class="gen-form-row row-3-cols">
                <div class="form-group">
                    <label class="gen-label">Capacitate Maximă:</label>
                    <input type="number" name="max_capacity" value="15" class="gen-input">
                </div>
                <div class="form-group">
                    <label class="gen-label">Durată (minute):</label>
                    <input type="number" name="duration_minutes" value="60" class="gen-input">
                </div>
                <div class="form-group">
                    <label class="gen-label" for="roomSelect">Sala cursului (Doar pt. Grup):</label>
                    <select name="room" id="roomSelect" class="gen-select">
                        {% for r in rooms %}
                            <option value="{{ r.id }}">{{ r.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="gen-form-row row-3-cols">
                <div class="form-group">
                    <label class="gen-label">De la data:</label>
                    <input type="date" name="start_date" required class="gen-input">
                </div>
                <div class="form-group">
                    <label class="gen-label">Până la data:</label>
                    <input type="date" name="end_date" required class="gen-input">
                </div>
                <div class="form-group">
                    <label class="gen-label">Ora clasei:</label>
                    <input type="time" name="class_time" required class="gen-input">
                </div>
            </div>

            <div class="gen-days-section">
                <label class="gen-label label-bold">Zilele în care se organizează clasa:</label>
                <div class="gen-days-checkboxes">
                    <label class="checkbox-label"><input type="checkbox" name="days_of_week" value="0"> Luni</label>
                    <label class="checkbox-label"><input type="checkbox" name="days_of_week" value="1"> Marți</label>
                    <label class="checkbox-label"><input type="checkbox" name="days_of_week" value="2"> Miercuri</label>
                    <label class="checkbox-label"><input type="checkbox" name="days_of_week" value="3"> Joi</label>
                    <label class="checkbox-label"><input type="checkbox" name="days_of_week" value="4"> Vineri</label>
                    <label class="checkbox-label"><input type="checkbox" name="days_of_week" value="5"> Sâmbătă</label>
                    <label class="checkbox-label"><input type="checkbox" name="days_of_week" value="6"> Duminică</label>
                </div>
            </div>

            <div class="gen-options-row">
                <label class="checkbox-label"><input type="checkbox" name="is_for_women_only"> Doar pentru Femei</label>
                <label class="checkbox-label"><input type="checkbox" name="is_for_children"> Clasă pentru Copii</label>
            </div>

            <div class="gen-actions-row">
                <a href="{% url 'admin_dashboard' %}" class="btn-back btn-cancel">Anulează</a>
                <button type="submit" class="btn-ocean btn-submit-gen">Generează Programul</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
